# Nama worker Anda di Cloudflare. Ganti dengan nama yang unik.
name = "cf-analytics-dashboard"

# Tanggal kompatibilitas untuk memastikan fitur berjalan seperti yang diharapkan.
compatibility_date = "2024-05-01"

# Konfigurasi ini memberitahu Wrangler untuk mendeploy proyek sebagai situs statis.
[site]
# Direktori yang berisi file statis Anda (HTML, CSS, JS).
# "." berarti direktori utama (root) dari proyek ini.
bucket = "."